<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Нет соединения — Музейная экспозиция</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      .offline-section {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 160px);
        text-align: center;
      }
      .offline-content {
        max-width: 520px;
        padding: 2rem;
      }
      .offline-icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        opacity: 0.6;
      }
      .offline-title {
        font-family: var(--font-serif);
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        color: var(--accent);
        margin-bottom: 1rem;
      }
      .offline-text {
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.7;
        margin-bottom: 2rem;
      }
      .offline-btn {
        display: inline-block;
        padding: 0.85rem 2rem;
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        border-radius: var(--radius-sm);
        font-family: var(--font-sans);
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.25s, color 0.25s;
      }
      .offline-btn:hover {
        background: var(--accent);
        color: #000;
      }
    </style>
  </head>
  <body>
    <header class="header" role="banner">
      <div class="container nav">
        <div class="logo">Музейная экспозиция</div>
      </div>
    </header>

    <main>
      <section class="offline-section" aria-label="Страница офлайн-режима">
        <div class="offline-content">
          <div class="offline-icon" aria-hidden="true">📡</div>
          <h1 class="offline-title">Нет подключения к интернету</h1>
          <p class="offline-text">
            К сожалению, страница недоступна без подключения к сети.<br />
            Проверьте интернет-соединение и попробуйте снова.
          </p>
          <button class="offline-btn" onclick="window.location.reload()">
            Попробовать снова
          </button>
        </div>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="container">
        <div class="footer-content">
          <div class="footer-info">
            <h3>Музейная экспозиция</h3>
            <p>© 2026 Все права защищены</p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>

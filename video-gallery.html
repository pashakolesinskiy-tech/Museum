<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прошлое в цвете — Видео-галерея — Музей детского сада №24</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Видео-галерея «Прошлое в цвете»: уникальные чёрно-белые фотографии и видеозаписи 1943–1981 годов из архива детского сада №24 г. Полоцка, оживающие в цвете."
    />
    <meta
      name="keywords"
      content="видео-галерея, прошлое в цвете, чёрно-белые фото, архив, детский сад Полоцк, Портнова, эвакуация Шумерля"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Прошлое в цвете — Видео-галерея" />
    <meta
      property="og:description"
      content="Уникальные чёрно-белые фотографии и видеозаписи 1943–1981 годов из архива детского сада №24 г. Полоцка, оживающие в цвете."
    />
    <meta property="og:image" content="assets/bw/img/photo-01.webp" />
    <meta property="og:type" content="video.other" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main-content"
      >Перейти к основному содержимому</a
    >

    <header id="site-header"></header>

    <main id="main-content">
      <section
        class="gallery-hero"
        aria-label="Видео-галерея «Прошлое в цвете»"
      >
        <div class="container">
          <h1 class="section-title animate-up">Прошлое в цвете</h1>
          <p class="section-subtitle animate-up">
            Каждое видео начинает свой рассказ с чёрно-белого кадра, а затем
            раскрывается в цвете. Нажмите на изображение, чтобы начать.
          </p>

          <!--
          Чтобы добавить новые фото/видео — отредактируйте массив в теге
          <script id="gallery-data"> ниже.
          Типы: "video" | "color" (ч/б → цвет) | "image" (просто фото)
        -->
          <script id="gallery-data" type="application/json">
            [
              {
                "type": "video",
                "poster": "assets/bw/img/photo-01.webp",
                "video": "assets/bw/video/video-01.mp4",
                "caption": "Портнова Полина Сергеевна с воспитанниками (1981 год)",
                "alt": "Чёрно-белое фото: Портнова Полина Сергеевна с воспитанниками, 1981 год"
              },
              {
                "type": "video",
                "poster": "assets/bw/img/photo-02.webp",
                "video": "assets/bw/video/video-02.mp4",
                "caption": "Воспитанники ясельной группы",
                "alt": "Чёрно-белое фото: воспитанники ясельной группы"
              },
              {
                "type": "video",
                "poster": "assets/bw/img/photo-03.webp",
                "video": "assets/bw/video/video-03.mp4",
                "caption": "Воспитанники ясельной группы",
                "alt": "Чёрно-белое фото: воспитанники ясельной группы"
              },
              {
                "type": "video",
                "poster": "assets/bw/img/photo-04.webp",
                "video": "assets/bw/video/video-04.mp4",
                "caption": "Воспитанники грудной группы Дома ребёнка им.Самойловой в г.Шумерля ЧССР (1944 год)",
                "alt": "Чёрно-белое фото: воспитанники грудной группы Дома ребёнка им.Самойловой в г.Шумерля ЧССР, 1944 год"
              },
              {
                "type": "color",
                "poster": "assets/bw/img/photo-05.webp",
                "colorSrc": "assets/bw/img/photo-05-color.webp",
                "caption": "Воспитанники Дома ребёнка им.Самойловой в г.Шумерля ЧССР (1943 год)",
                "alt": "Чёрно-белое фото: воспитанники Дома ребёнка им.Самойловой в г.Шумерля ЧССР, 1943 год",
                "altColor": "Цветная версия фото 1943 года"
              },
              {
                "type": "color",
                "poster": "assets/bw/img/photo-06.webp",
                "colorSrc": "assets/bw/img/photo-06-color.webp",
                "caption": "Воспитанники Дома ребёнка им.Самойловой в г.Шумерля ЧССР (1944 год)",
                "alt": "Чёрно-белое фото: воспитанники Дома ребёнка им.Самойловой в г.Шумерля ЧССР, 1944 год",
                "altColor": "Цветная версия фото 1944 года"
              },
              {
                "type": "video",
                "poster": "assets/bw/img/photo-07.webp",
                "video": "assets/bw/video/video-07.mp4",
                "caption": "Работники Детских яслей №1",
                "alt": "Чёрно-белое фото: работники Детских яслей №1"
              }
            ]
          </script>

          <div
            class="video-gallery-vertical"
            id="video-gallery-container"
            role="list"
            aria-label="Видеоматериалы"
          ></div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <audio id="bg-music" loop>
      <source src="assets/audio/music-video-gallery.mp3" type="audio/mpeg" />
      Ваш браузер не поддерживает аудио.
    </audio>

    <button id="music-toggle" class="music-toggle" aria-label="Включить музыку" aria-pressed="false">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path class="note-icon" d="M9 18V5l12-2v13"/>
        <circle class="note-icon" cx="6" cy="18" r="3"/>
        <circle class="note-icon" cx="18" cy="16" r="3"/>
      </svg>
      <svg class="pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
    </button>
    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вещи из личного архива — Полина Сергеевна Портнова</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Вещи из личного архива Полины Сергеевны Портновой — архивные фотографии из фондов виртуального музея детского сада №24 г. Полоцка."
    />
    <meta
      name="keywords"
      content="Полина Портнова, личный архив, архивные фото, детский сад Полоцк, Великая Отечественная война"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Вещи из личного архива — Полина Сергеевна Портнова"
    />
    <meta
      property="og:description"
      content="Архивные фотографии из личного архива Полины Сергеевны Портновой."
    />
    <meta property="og:image" content="assets/portnova.webp" />
    <meta property="og:type" content="website" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="gallery-page">
    <a class="skip-link" href="#main-content"
      >Перейти к основному содержимому</a
    >

    <header id="site-header"></header>

    <main id="main-content">
      <section
        class="bio-hero"
        aria-label="Личный архив Полины Сергеевны Портновой"
      >
        <div class="container">
          <!-- Заголовок с кнопкой назад -->
          <div class="archive-header animate-up">
            <a
              href="portnova.html"
              class="archive-back-btn"
              aria-label="Вернуться к странице Портновой"
            >
              <span aria-hidden="true">←</span> Полина Сергеевна Портнова
            </a>
            <h1 class="bio-gallery-title" style="margin-bottom: 0">
              Вещи из личного архива
            </h1>
            <p class="bio-gallery-sub">Полины Сергеевны Портновой</p>
          </div>

          <!--
            Поля: src, alt (обязательные)
                  name — 
                  date — дата (необязательно)
                  note — вторая строка (необязательно)
          -->
          <!-- Архив загружается из assets/portnova/manifest.json -->
          <div
            class="gallery-grid"
            id="archive-grid"
            role="list"
            aria-label="Архивные фотографии"
          ></div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <audio id="bg-music" loop>
      <source src="assets/audio/music-main.mp3" type="audio/mpeg" />
      Ваш браузер не поддерживает аудио.
    </audio>

    <button
      id="music-toggle"
      class="music-toggle"
      aria-label="Включить музыку"
      aria-pressed="false"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <path class="note-icon" d="M9 18V5l12-2v13" />
        <circle class="note-icon" cx="6" cy="18" r="3" />
        <circle class="note-icon" cx="18" cy="16" r="3" />
      </svg>
      <svg
        class="pause-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <rect x="6" y="4" width="4" height="16" rx="1" />
        <rect x="14" y="4" width="4" height="16" rx="1" />
      </svg>
    </button>
    <!-- Универсальный лайтбокс -->
    <div id="lb-overlay" class="lb-overlay" role="dialog" aria-modal="true" aria-label="Просмотр фотографии">
      <div class="lb-inner">
        <button class="lb-close" id="lb-close" aria-label="Закрыть">&times;</button>
        <img class="lb-img" id="lb-img" src="" alt="" />
        <p class="lb-caption" id="lb-caption"></p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
